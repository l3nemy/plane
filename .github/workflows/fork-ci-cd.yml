name: Fork CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy this ref after CI
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: fork-ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.18.0"
  PNPM_VERSION: "10.32.1"
  PYTHON_VERSION: "3.12"

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store path
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Restore pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm check:format

      - name: Check lint
        run: pnpm check:lint

      - name: Build packages and apps
        run: pnpm build

      - name: Check types
        run: pnpm check:types

  api:
    name: API checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15.7-alpine
        env:
          POSTGRES_DB: plane
          POSTGRES_PASSWORD: plane
          POSTGRES_USER: plane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plane -d plane"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: valkey/valkey:7.2.11-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://plane:plane@localhost:5432/plane
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: fork-ci-secret-key
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install API test dependencies
        working-directory: apps/api
        run: |
          uv venv
          uv pip install -r requirements/test.txt ruff==0.9.7

      - name: Lint API
        working-directory: apps/api
        run: uv run --python .venv/bin/python ruff check .

      - name: Run API integration unit tests
        working-directory: apps/api
        run: uv run --python .venv/bin/python python -m pytest plane/tests/unit/integrations

  deploy:
    name: Deploy to private server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - web
      - api
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    environment: production
    env:
      DEPLOY_COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE_FILE || 'docker-compose.yml' }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
    steps:
      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST" || (echo "DEPLOY_HOST is required" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "DEPLOY_PATH is required" && exit 1)
          test -n "$DEPLOY_SSH_KEY" || (echo "DEPLOY_SSH_KEY is required" && exit 1)
          test -n "$DEPLOY_USER" || (echo "DEPLOY_USER is required" && exit 1)

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy source build
        shell: bash
        run: |
          printf -v remote_path "%q" "$DEPLOY_PATH"
          printf -v remote_ref "%q" "$GITHUB_REF_NAME"
          printf -v remote_sha "%q" "$GITHUB_SHA"
          printf -v remote_compose "%q" "$DEPLOY_COMPOSE_FILE"

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH=$remote_path DEPLOY_REF=$remote_ref DEPLOY_SHA=$remote_sha DEPLOY_COMPOSE_FILE=$remote_compose bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          git fetch origin "$DEPLOY_REF"
          git checkout "$DEPLOY_REF"
          git reset --hard "$DEPLOY_SHA"

          docker compose -f "$DEPLOY_COMPOSE_FILE" build
          docker compose -f "$DEPLOY_COMPOSE_FILE" up -d --remove-orphans
          docker compose -f "$DEPLOY_COMPOSE_FILE" ps
          REMOTE
