name: Fork CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy this ref after CI
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write

concurrency:
  group: fork-ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  NODE_VERSION: "22.18.0"
  PNPM_VERSION: "10.32.1"
  PYTHON_VERSION: "3.12"

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      image_owner: ${{ steps.version.outputs.image_owner }}
      image_tag: ${{ steps.version.outputs.image_tag }}
      light_tag: ${{ steps.version.outputs.light_tag }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    steps:
      - name: Compute image version
        id: version
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          light_tag="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_.-]/-/g')"

          echo "image_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "light_tag=${light_tag}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

  web:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store path
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Restore pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm check:format

      - name: Check lint
        run: pnpm check:lint

      - name: Build packages and apps
        run: pnpm build

      - name: Check types
        run: pnpm check:types

  api:
    name: API checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15.7-alpine
        env:
          POSTGRES_DB: plane
          POSTGRES_PASSWORD: plane
          POSTGRES_USER: plane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plane -d plane"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: valkey/valkey:7.2.11-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://plane:plane@localhost:5432/plane
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: fork-ci-secret-key
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install API test dependencies
        working-directory: apps/api
        run: |
          uv venv
          uv pip install -r requirements/test.txt ruff==0.9.7

      - name: Lint API
        working-directory: apps/api
        run: uv run --python .venv/bin/python ruff check .

      - name: Run API integration unit tests
        working-directory: apps/api
        run: uv run --python .venv/bin/python python -m pytest plane/tests/unit/integrations

  images:
    name: Build and push GHCR images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - version
      - web
      - api
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: plane-admin
            dockerfile: ./apps/admin/Dockerfile.admin
            context: .
          - image: plane-backend
            dockerfile: ./apps/api/Dockerfile.api
            context: ./apps/api
          - image: plane-frontend
            dockerfile: ./apps/web/Dockerfile.web
            context: .
          - image: plane-live
            dockerfile: ./apps/live/Dockerfile.live
            context: .
          - image: plane-proxy
            dockerfile: ./apps/proxy/Dockerfile.ce
            context: ./apps/proxy
          - image: plane-space
            dockerfile: ./apps/space/Dockerfile.space
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ needs.version.outputs.image_owner }}/${{ matrix.image }}:${{ needs.version.outputs.image_tag }}
            ${{ env.GHCR_REGISTRY }}/${{ needs.version.outputs.image_owner }}/${{ matrix.image }}:${{ needs.version.outputs.light_tag }}
            ${{ env.GHCR_REGISTRY }}/${{ needs.version.outputs.image_owner }}/${{ matrix.image }}:latest

  deploy:
    name: Deploy to private server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - version
      - images
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    environment: production
    env:
      DEPLOY_COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE_FILE || 'docker-compose.ghcr.yml' }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      IMAGE_OWNER: ${{ needs.version.outputs.image_owner }}
      IMAGE_TAG: ${{ needs.version.outputs.image_tag }}
    steps:
      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST" || (echo "DEPLOY_HOST is required" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "DEPLOY_PATH is required" && exit 1)
          test -n "$DEPLOY_SSH_KEY" || (echo "DEPLOY_SSH_KEY is required" && exit 1)
          test -n "$DEPLOY_USER" || (echo "DEPLOY_USER is required" && exit 1)
          test -n "$GHCR_TOKEN" || (echo "GHCR_TOKEN is required for server image pulls" && exit 1)
          test -n "$GHCR_USERNAME" || (echo "GHCR_USERNAME is required for server image pulls" && exit 1)

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy GHCR images
        shell: bash
        run: |
          printf -v remote_path "%q" "$DEPLOY_PATH"
          printf -v remote_ref "%q" "$GITHUB_REF_NAME"
          printf -v remote_sha "%q" "$GITHUB_SHA"
          printf -v remote_compose "%q" "$DEPLOY_COMPOSE_FILE"
          printf -v remote_ghcr_token "%q" "$GHCR_TOKEN"
          printf -v remote_ghcr_username "%q" "$GHCR_USERNAME"
          printf -v remote_image_owner "%q" "$IMAGE_OWNER"
          printf -v remote_image_tag "%q" "$IMAGE_TAG"

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_RELEASE=$remote_image_tag DEPLOY_PATH=$remote_path DEPLOY_REF=$remote_ref DEPLOY_SHA=$remote_sha DEPLOY_COMPOSE_FILE=$remote_compose GHCR_OWNER=$remote_image_owner GHCR_TOKEN=$remote_ghcr_token GHCR_USERNAME=$remote_ghcr_username bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          git fetch origin "$DEPLOY_REF"
          git checkout "$DEPLOY_REF"
          git reset --hard "$DEPLOY_SHA"

          printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose -f "$DEPLOY_COMPOSE_FILE" pull
          docker compose -f "$DEPLOY_COMPOSE_FILE" up -d --remove-orphans
          docker compose -f "$DEPLOY_COMPOSE_FILE" ps
          REMOTE
