name: Fork Deploy

on:
  workflow_run:
    workflows:
      - Fork CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: fork-deploy-production
  cancel-in-progress: false

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image_owner: ${{ steps.version.outputs.image_owner }}
      image_tag: ${{ steps.version.outputs.image_tag }}
      light_tag: ${{ steps.version.outputs.light_tag }}
      source_ref: ${{ steps.version.outputs.source_ref }}
      source_sha: ${{ steps.version.outputs.source_sha }}
    steps:
      - name: Compute deploy version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            source_ref="$WORKFLOW_RUN_HEAD_BRANCH"
            source_sha="$WORKFLOW_RUN_HEAD_SHA"
          else
            source_ref="$GITHUB_REF_NAME"
            source_sha="$GITHUB_SHA"
          fi

          short_sha="${source_sha::12}"
          light_tag="$(echo "$source_ref" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_.-]/-/g')"

          echo "image_owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "light_tag=${light_tag}" >> "$GITHUB_OUTPUT"
          echo "source_ref=${source_ref}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"

  images:
    name: Build and push GHCR images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - version
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: plane-admin
            dockerfile: ./apps/admin/Dockerfile.admin
            context: .
          - image: plane-backend
            dockerfile: ./apps/api/Dockerfile.api
            context: ./apps/api
          - image: plane-frontend
            dockerfile: ./apps/web/Dockerfile.web
            context: .
          - image: plane-live
            dockerfile: ./apps/live/Dockerfile.live
            context: .
          - image: plane-proxy
            dockerfile: ./apps/proxy/Dockerfile.ce
            context: ./apps/proxy
          - image: plane-space
            dockerfile: ./apps/space/Dockerfile.space
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.source_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          labels: |
            org.opencontainers.image.revision=${{ needs.version.outputs.source_sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ needs.version.outputs.image_owner }}/${{ matrix.image }}:${{ needs.version.outputs.image_tag }}
            ${{ env.GHCR_REGISTRY }}/${{ needs.version.outputs.image_owner }}/${{ matrix.image }}:${{ needs.version.outputs.light_tag }}
            ${{ env.GHCR_REGISTRY }}/${{ needs.version.outputs.image_owner }}/${{ matrix.image }}:latest

  deploy:
    name: Deploy to private server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - version
      - images
    environment: production
    env:
      DEPLOY_COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE_FILE || 'docker-compose.ghcr.yml' }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      IMAGE_OWNER: ${{ needs.version.outputs.image_owner }}
      IMAGE_TAG: ${{ needs.version.outputs.image_tag }}
      SOURCE_REF: ${{ needs.version.outputs.source_ref }}
      SOURCE_SHA: ${{ needs.version.outputs.source_sha }}
    steps:
      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST" || (echo "DEPLOY_HOST is required" && exit 1)
          test -n "$DEPLOY_PATH" || (echo "DEPLOY_PATH is required" && exit 1)
          test -n "$DEPLOY_SSH_KEY" || (echo "DEPLOY_SSH_KEY is required" && exit 1)
          test -n "$DEPLOY_USER" || (echo "DEPLOY_USER is required" && exit 1)
          test -n "$GHCR_TOKEN" || (echo "GHCR_TOKEN is required for server image pulls" && exit 1)
          test -n "$GHCR_USERNAME" || (echo "GHCR_USERNAME is required for server image pulls" && exit 1)

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy GHCR images
        shell: bash
        run: |
          printf -v remote_path "%q" "$DEPLOY_PATH"
          printf -v remote_ref "%q" "$SOURCE_REF"
          printf -v remote_sha "%q" "$SOURCE_SHA"
          printf -v remote_compose "%q" "$DEPLOY_COMPOSE_FILE"
          printf -v remote_ghcr_token "%q" "$GHCR_TOKEN"
          printf -v remote_ghcr_username "%q" "$GHCR_USERNAME"
          printf -v remote_image_owner "%q" "$IMAGE_OWNER"
          printf -v remote_image_tag "%q" "$IMAGE_TAG"

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_RELEASE=$remote_image_tag DEPLOY_PATH=$remote_path DEPLOY_REF=$remote_ref DEPLOY_SHA=$remote_sha DEPLOY_COMPOSE_FILE=$remote_compose GHCR_OWNER=$remote_image_owner GHCR_TOKEN=$remote_ghcr_token GHCR_USERNAME=$remote_ghcr_username bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          git fetch origin "$DEPLOY_REF"
          git checkout "$DEPLOY_REF"
          git reset --hard "$DEPLOY_SHA"

          printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose -f "$DEPLOY_COMPOSE_FILE" pull
          docker compose -f "$DEPLOY_COMPOSE_FILE" up -d --remove-orphans
          docker compose -f "$DEPLOY_COMPOSE_FILE" ps
          REMOTE
