services:
  web:
    container_name: web
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER:-l3nemy}/plane-frontend:${APP_RELEASE:?APP_RELEASE is required}
    pull_policy: always
    restart: always
    depends_on:
      - api

  admin:
    container_name: admin
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER:-l3nemy}/plane-admin:${APP_RELEASE:?APP_RELEASE is required}
    pull_policy: always
    restart: always
    depends_on:
      - api
      - web

  space:
    container_name: space
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER:-l3nemy}/plane-space:${APP_RELEASE:?APP_RELEASE is required}
    pull_policy: always
    restart: always
    depends_on:
      - api
      - web

  api:
    container_name: api
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER:-l3nemy}/plane-backend:${APP_RELEASE:?APP_RELEASE is required}
    pull_policy: always
    restart: always
    command: ./bin/docker-entrypoint-api.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - plane-db
      - plane-redis

  worker:
    container_name: bgworker
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER:-l3nemy}/plane-backend:${APP_RELEASE:?APP_RELEASE is required}
    pull_policy: always
    restart: always
    command: ./bin/docker-entrypoint-worker.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - api
      - plane-db
      - plane-redis

  beat-worker:
    container_name: beatworker
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER:-l3nemy}/plane-backend:${APP_RELEASE:?APP_RELEASE is required}
    pull_policy: always
    restart: always
    command: ./bin/docker-entrypoint-beat.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - api
      - plane-db
      - plane-redis

  migrator:
    container_name: plane-migrator
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER:-l3nemy}/plane-backend:${APP_RELEASE:?APP_RELEASE is required}
    pull_policy: always
    restart: no
    command: ./bin/docker-entrypoint-migrator.sh
    env_file:
      - ./apps/api/.env
    depends_on:
      - plane-db
      - plane-redis

  live:
    container_name: plane-live
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER:-l3nemy}/plane-live:${APP_RELEASE:?APP_RELEASE is required}
    pull_policy: always
    restart: always

  plane-db:
    container_name: plane-db
    image: postgres:15.7-alpine
    restart: always
    command: postgres -c 'max_connections=1000'
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data

  plane-redis:
    container_name: plane-redis
    image: valkey/valkey:7.2.11-alpine
    restart: always
    volumes:
      - redisdata:/data

  plane-mq:
    container_name: plane-mq
    image: rabbitmq:3.13.6-management-alpine
    restart: always
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  plane-rustfs:
    container_name: plane-rustfs
    image: rustfs/rustfs:latest
    restart: always
    command: --console-enable /export
    volumes:
      - uploads:/export
    environment:
      RUSTFS_ACCESS_KEY: ${AWS_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
      RUSTFS_CONSOLE_ENABLE: "true"

  proxy:
    container_name: proxy
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER:-l3nemy}/plane-proxy:${APP_RELEASE:?APP_RELEASE is required}
    pull_policy: always
    restart: always
    ports:
      - ${LISTEN_HTTP_PORT}:80
      - ${LISTEN_HTTPS_PORT}:443
    environment:
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
      BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
    depends_on:
      - web
      - api
      - space
      - admin
      - plane-rustfs

volumes:
  pgdata:
  redisdata:
  uploads:
  rabbitmq_data:
